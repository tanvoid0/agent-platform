# Agent Platform only — use when llm-orchestrator is already running on the host (port 18408).
#   docker-compose -f docker-compose.agent-only.yml up --build
#
# SQLite + workspaces: same named volume as docker-compose.yml (`agent_platform_data`) so data is shared
# when you use the same project directory. Survives image rebuilds; removed only with `docker compose down -v`.
#
# Do not set PATH=${PATH} from the host; it breaks Linux containers on Windows.

services:
  agent-platform:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "18410"]
    ports:
      - "127.0.0.1:18410:18410"
    env_file:
      - .env
    environment:
      AGENT_PLATFORM_DB_PATH: /app/data/agent_runs.db
      AGENT_PLATFORM_WORKSPACE_ROOT: /app/data/workspaces
      LLM_ORCHESTRATOR_BASE_URL: http://host.docker.internal:18408/v1
    volumes:
      - agent_platform_data:/app/data
      - ./app:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  agent_platform_data:
