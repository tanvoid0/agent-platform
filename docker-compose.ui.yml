# Alias for the default backend + Flow UI stack.
#   docker compose -f docker-compose.yml -f docker-compose.ui.yml up --build

services:
  server:
    environment:
      AGENT_PLATFORM_CONTAINER_MODE: backend
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://127.0.0.1:3333}
    ports:
      - "18410:18410"
