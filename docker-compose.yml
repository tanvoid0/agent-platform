# Agent Platform API + embedded LLM proxy (backend only).
#   docker compose up --build
#
# Config UI: http://127.0.0.1:18410/config  |  API: http://127.0.0.1:18410/docs
# Optional Flow UI (React): from repo root — `docker compose --profile ui up --build`
#
# SQLite + workspaces live on the named volume `agent_platform_data`.
# LLM proxy config + .env live under /app/data/llm (config.yaml, .env).

services:
  agent-platform:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "workers=$${AGENT_PLATFORM_UVICORN_WORKERS:-1};
      db=$${AGENT_PLATFORM_DB_PATH:-/app/data/agent_platform.db};
      case \"$$db\" in *.db|*.sqlite|*.sqlite3)
        if [ \"$$workers\" != \"1\" ]; then
          echo \"WARNING: SQLite ($$db) — clamping uvicorn workers to 1 ($$workers requested). Set AGENT_PLATFORM_UVICORN_WORKERS=1 or use Postgres for multi-worker.\";
          workers=1;
        fi;;
      esac;
      exec uvicorn main:app --host 0.0.0.0 --port 18410
      --workers $$workers
      --timeout-keep-alive $${AGENT_PLATFORM_UVICORN_KEEPALIVE_SECONDS:-30}"
    ports:
      - "18410:18410"
    env_file:
      - .env
    environment:
      AGENT_PLATFORM_DB_PATH: /app/data/agent_platform.db
      AGENT_PLATFORM_WORKSPACE_ROOT: /app/data/workspaces
      CONFIG_DIR: /app/data/llm
      CONFIG_PATH: /app/data/llm/config.yaml
      ORCHESTRATOR_INTERNAL_URL: http://127.0.0.1:18410
      PROXY_PUBLIC_URL: http://127.0.0.1:18410
      LLM_ORCHESTRATOR_BASE_URL: http://127.0.0.1:18410/v1
      AGENT_PLATFORM_DAG_MAX_CONCURRENT_TASKS: ${AGENT_PLATFORM_DAG_MAX_CONCURRENT_TASKS:-12}
      UV_THREADPOOL_SIZE: ${UV_THREADPOOL_SIZE:-16}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-16}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-16}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-16}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-16}
      AGENT_PLATFORM_ORCHESTRATOR_DOCKER_FIX: "0"
      AGENT_PLATFORM_LOCAL_LLM_DOCKER_FIX: "1"
    volumes:
      - agent_platform_data:/app/data
      - ./app:/app
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app
          ignore:
            - __pycache__/
            - .pytest_cache/
            - "*.pyc"
        - action: rebuild
          path: ./app/requirements.txt
    restart: unless-stopped

volumes:
  agent_platform_data:
