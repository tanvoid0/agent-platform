# Agent Platform API + embedded LLM proxy + Vite UI. Run from this directory:
#   docker-compose up --build
#   docker compose up --build
#
# UI: http://127.0.0.1:3333/flow/  |  API + OpenAI-compatible /v1: http://127.0.0.1:18410
#
# SQLite + workspaces live on the named volume `agent_platform_data` (survives `docker compose build` / `up --build`).
# LLM proxy config + .env live under /app/data/llm (config.yaml, .env). Override with CONFIG_DIR / CONFIG_PATH.
# Removing data: `docker compose down -v` (only then is the volume deleted). To reset DB only, stop the stack and
# `docker volume rm <project>_agent_platform_data` or prune volumes with care.
#
# Set AGENT_PLATFORM_MASTER_KEY in agent-platform/.env (bearer for /v1). Flow Settings → LLM proxy edits the same keys on disk.

services:
  agent-platform:
    build:
      context: .
      dockerfile: Dockerfile
    # No --reload: bind-mount + WatchFiles on Windows often reload-loops and exits (Exited 0).
    # Use env-tuned workers/threads; defaults target high-core desktops.
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 18410
      --workers ${AGENT_PLATFORM_UVICORN_WORKERS:-8}
      --timeout-keep-alive ${AGENT_PLATFORM_UVICORN_KEEPALIVE_SECONDS:-30}"
    ports:
      - "127.0.0.1:18410:18410"
    env_file:
      - .env
    environment:
      AGENT_PLATFORM_DB_PATH: /app/data/agent_platform.db
      AGENT_PLATFORM_WORKSPACE_ROOT: /app/data/workspaces
      CONFIG_DIR: /app/data/llm
      CONFIG_PATH: /app/data/llm/config.yaml
      ORCHESTRATOR_INTERNAL_URL: http://127.0.0.1:18410
      PROXY_PUBLIC_URL: http://127.0.0.1:18410
      LLM_ORCHESTRATOR_BASE_URL: http://127.0.0.1:18410/v1
      AGENT_PLATFORM_DAG_MAX_CONCURRENT_TASKS: ${AGENT_PLATFORM_DAG_MAX_CONCURRENT_TASKS:-12}
      UV_THREADPOOL_SIZE: ${UV_THREADPOOL_SIZE:-16}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-16}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-16}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-16}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-16}
      # Leave orchestrator fix off so HTTP self-calls to :18410 stay on loopback inside the container.
      # LM Studio / Ollama on the host: keep config/agent_platform.yaml (or env) as 127.0.0.1 —
      # the server rewrites those to host.docker.internal when /.dockerenv is present.
      AGENT_PLATFORM_ORCHESTRATOR_DOCKER_FIX: "0"
      AGENT_PLATFORM_LOCAL_LLM_DOCKER_FIX: "1"
    volumes:
      - agent_platform_data:/app/data
      - ./app:/app
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app
          ignore:
            - __pycache__/
            - .pytest_cache/
            - "*.pyc"
        - action: rebuild
          path: ./app/requirements.txt
    restart: unless-stopped

  agent-platform-ui:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3333:3333"
    environment:
      AGENT_PLATFORM_PROXY_TARGET: http://agent-platform:18410
    develop:
      watch:
        - action: sync
          path: ./web
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./web/package.json
        - action: rebuild
          path: ./web/pnpm-lock.yaml
    depends_on:
      - agent-platform
    restart: unless-stopped

volumes:
  agent_platform_data:
