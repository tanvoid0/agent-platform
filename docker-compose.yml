# Agent Platform — unified image (backend + Flow UI).
#
# Backend + Flow UI (default):
#   pnpm docker:up
#
# Backend only:
#   pnpm docker:up:server
#
# Flow UI static only (API elsewhere; set VITE_API_ORIGIN at build):
#   docker compose -f docker-compose.yml -f docker-compose.ui-only.yml up --build
#
# Config UI: http://127.0.0.1:18410/config  |  API: http://127.0.0.1:18410/docs
# Flow UI:   http://127.0.0.1:3333/app/

services:
  server:
    image: agent-platform:${AGENT_PLATFORM_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-}
        VITE_AGENT_PLATFORM_MASTER_KEY: ${AGENT_PLATFORM_MASTER_KEY:-}
    environment:
      AGENT_PLATFORM_CONTAINER_MODE: ${AGENT_PLATFORM_CONTAINER_MODE:-backend}
      DATABASE_URL: ""
      AGENT_PLATFORM_DB_PATH: /app/data/agent_platform.db
      AGENT_PLATFORM_WORKSPACE_ROOT: /app/data/workspaces
      CONFIG_DIR: /app/data/llm
      CONFIG_PATH: /app/data/llm/config.yaml
      ORCHESTRATOR_INTERNAL_URL: http://127.0.0.1:18410
      PROXY_PUBLIC_URL: http://127.0.0.1:18410
      LLM_ORCHESTRATOR_BASE_URL: http://127.0.0.1:18410/v1
      AGENT_PLATFORM_DAG_MAX_CONCURRENT_TASKS: ${AGENT_PLATFORM_DAG_MAX_CONCURRENT_TASKS:-12}
      UV_THREADPOOL_SIZE: ${UV_THREADPOOL_SIZE:-16}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-16}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-16}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-16}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-16}
      AGENT_PLATFORM_ORCHESTRATOR_DOCKER_FIX: "0"
      AGENT_PLATFORM_LOCAL_LLM_DOCKER_FIX: "1"
      AGENT_PLATFORM_UVICORN_WORKERS: ${AGENT_PLATFORM_UVICORN_WORKERS:-1}
      AGENT_PLATFORM_UVICORN_KEEPALIVE_SECONDS: ${AGENT_PLATFORM_UVICORN_KEEPALIVE_SECONDS:-30}
      # BYOK: extra allowlisted upstream hosts for client X-BYOK-Base-Url (canonical
      # provider hosts are always allowed). Provider keys still come from .env.
      BYOK_ALLOWED_HOSTS: ${BYOK_ALLOWED_HOSTS:-}
    ports:
      - "18410:18410"
    env_file:
      - .env
    volumes:
      - agent_platform_data:/app/data
      - ./app:/app
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app
          ignore:
            - __pycache__/
            - .pytest_cache/
            - "*.pyc"
        - action: rebuild
          path: ./app/requirements.txt
    restart: unless-stopped

  client:
    image: agent-platform:${AGENT_PLATFORM_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-}
        VITE_AGENT_PLATFORM_MASTER_KEY: ${AGENT_PLATFORM_MASTER_KEY:-}
    environment:
      AGENT_PLATFORM_CONTAINER_MODE: ui
    env_file:
      - .env
    ports:
      - "127.0.0.1:3333:18408"
    volumes: []
    develop: {}
    depends_on:
      - server
    restart: unless-stopped

volumes:
  agent_platform_data:
