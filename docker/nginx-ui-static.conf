server {
    listen __UI_PORT__;
    server_name _;
    root /usr/share/nginx/html;

    location = /app {
        return 301 /app/;
    }

    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"agent-platform-ui"}\n';
    }
}
