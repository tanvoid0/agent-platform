upstream agent_platform_api {
    server 127.0.0.1:__API_PORT__;
}

server {
    listen __UI_PORT__;
    server_name _;
    root /usr/share/nginx/html;

    location = /app {
        return 301 /app/;
    }

    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    location /v1/ {
        proxy_pass http://agent_platform_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location ~ ^/(api|processes|teams|projects|workspaces|config|ui|docs|openapi\.json|health|tokens|redoc|api-guide)(/|$) {
        proxy_pass http://agent_platform_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"agent-platform-ui"}\n';
    }
}
