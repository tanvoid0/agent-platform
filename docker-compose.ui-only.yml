# Merge with docker-compose.yml for Flow UI static only (no API in container).
# Set VITE_API_ORIGIN at build when the API runs elsewhere.
#   docker compose -f docker-compose.yml -f docker-compose.ui-only.yml up --build

services:
  server:
    profiles: ["__off__"]

  client:
    environment:
      AGENT_PLATFORM_CONTAINER_MODE: ui
    ports: !override
      - "127.0.0.1:3333:18408"
    volumes: !override []
    develop: !override {}
    depends_on: !override []
